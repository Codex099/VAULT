name: tafraj_tv
description: "CineStream - Premium Movie Streaming App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  http: ^1.2.0

  # Image loading
  cached_network_image: ^3.3.1

  # WebView (player)
  webview_flutter: ^4.4.2
  webview_flutter_web: ^0.2.3

  # Video player (for direct streams)
  video_player: ^2.8.2
  chewie: ^1.7.4

  # UI
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.0.0

  # State management
  provider: ^6.1.1

  # Navigation
  go_router: ^13.0.0

  # Utilities
  intl: ^0.20.2
  path_provider: ^2.1.2
  share_plus: ^7.2.1
  screen_brightness: ^2.1.2
  flutter_volume_controller: ^1.3.4
  flutter_localizations:
    sdk: flutter

  # Code generation (Hive adapters)
  hive_generator: ^2.0.1
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
